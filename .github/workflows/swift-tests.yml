name: Swift Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - '.swiftlint.yml'
      - 'Package.swift'
      - 'Sources/**'
      - 'Tests/**'
      - '.github/workflows/swift-tests.yml'
  push:
    branches:
      - main
    paths:
      - '.swiftlint.yml'
      - 'Package.swift'
      - 'Sources/**'
      - 'Tests/**'
      - '.github/workflows/swift-tests.yml'
  workflow_dispatch:

jobs:
  checkout:
    name: Checkout
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Swift version
        run: xcrun swift --version

  lint:
    name: Lint
    runs-on: macos-26
    needs: [checkout]

    steps:
      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          swiftlint version
      - name: SwiftLint
        run: |
          # Run SwiftLint with GitHub annotations for PR comments
          swiftlint lint --reporter github-actions-logging
          # Also generate JSON report for artifacts
          swiftlint lint --reporter json > swiftlint-results.json || true

  test_package:
    name: Test Package
    runs-on: macos-26
    needs: [lint]

    steps:
      - name: Run iOS package tests
        run: |
          xcodebuild test -configuration Debug \
            -scheme 'TransactionHistory' \
            -destination 'platform=iOS Simulator,OS=latest,arch=arm64,name=iPhone 17'

  test_app:
    name: Test app
    runs-on: macos-26
    needs: [lint]

    steps:
      - name: Run iOS app tests
        run: |
          (cd App ; xcodebuild test -configuration Debug \
            -scheme 'TransactionHistoryApp' \
            -destination 'platform=iOS Simulator,OS=latest,arch=arm64,name=iPhone 17' \
            -only-testing:TransactionHistoryAppTests)
