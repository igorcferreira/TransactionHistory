name: Swift Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - '.swiftlint.yml'
      - 'Package.swift'
      - 'Sources/**'
      - 'Tests/**'
      - 'App/**'
      - '.github/workflows/swift-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          swiftlint version
      - name: SwiftLint
        run: |
          # Run SwiftLint with GitHub annotations for PR comments
          swiftlint lint --strict --reporter github-actions-logging
          # Also generate JSON report for artifacts
          swiftlint lint --strict --reporter json > swiftlint-results.json || true

  test_package:
    name: Test Package
    runs-on: macos-26
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run iOS package tests
        run: |
          xcodebuild test -configuration Debug \
            -scheme 'TransactionHistory' \
            -destination 'platform=iOS Simulator,OS=latest,arch=arm64,name=iPhone 17'

  test_app:
    name: Test app
    runs-on: macos-26
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run iOS app tests
        run: |
          # SWIFT_SUPPRESS_WARNINGS=NO prevents Xcode from passing -suppress-warnings
          # to local package dependency targets, which would conflict with the package's
          # .treatAllWarnings(as: .error) Swift setting (-warnings-as-errors).
          (cd App ; xcodebuild test -configuration Debug \
            -scheme 'TransactionHistoryApp' \
            -destination 'platform=iOS Simulator,OS=latest,arch=arm64,name=iPhone 17' \
            -only-testing:TransactionHistoryAppTests \
            SWIFT_SUPPRESS_WARNINGS=NO)
